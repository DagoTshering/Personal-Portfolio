version: '3.8'

services:
  app:
    build: .
    container_name: portfolio_backend
    restart: always
    ports:
      - "5000:5000"          # Exposes Node.js on port 5000
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/portfolio
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads   # For any file uploads

  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NOTE: No ports exposed — only accessible inside Docker network

volumes:
  postgres_data:
